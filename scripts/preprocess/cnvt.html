  const keys = Object.keys(GLYPHS_CLASCII);
  let def = "const GLYPHS_CLASCII = {\n";
  
  for(let i = 0; i < keys.length; i++) {
    let key = keys[i];
    const val = GLYPHS_CLASCII[key];
    //only use ASCII encoding in files for consistency
    const keyCode = key.codePointAt(0);
    let outKey = keyCode < 128 || key.length > 1 ? key : "\\u" + keyCode.toString(16).padStart(4, '0');
    
    if(typeof(val) == "string") {
      def += `  '${outKey}': '${val}',\n`;
    } else {
      let converted = 0n;
      
      for(let y = 0n; y < 8n; y++) {
        for(let x = 0n; x < 8n; x++) {
          if(val[y][x] != ' ') {
            converted |= (1n << x) << (y * 8n);
          }
        }
      }
      if(outKey == '\\') {
        outKey = "\\\\";
      } else if(key == '\'') {
        outKey = "\\'";
      }
      def += `  '${outKey}': 0x${converted.toString(16).toUpperCase().padStart(16, '0')}n,\n`;
    }
  }
