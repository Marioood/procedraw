<svg width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="64" height="64" fill="black"/>
	<defs>
		<linearGradient id="light-grad" x1="0" x2="0" y1="0" y2="100%">
			<stop offset="0" stop-color="#a0a0a0"/>
			<stop offset="100%" stop-color="white"/>
		</linearGradient>
		<linearGradient id="light-grad-short" x1="0" x2="0" y1="0" y2="133%">
			<stop offset="0" stop-color="#a0a0a0"/>
			<stop offset="100%" stop-color="white"/>
		</linearGradient>
	</defs>
  <rect x="1" y="1" width="22" height="22" fill="url(#light-grad)"/>
  <rect x="25" y="1" width="22" height="22" fill="url(#light-grad)"/>
  <rect x="49" y="1" width="14" height="22" fill="url(#light-grad)"/>
  
  <rect x="1" y="25" width="22" height="22" fill="url(#light-grad)"/>
  <rect x="49" y="25" width="14" height="22" fill="url(#light-grad)"/>
  
  <rect x="1" y="49" width="22" height="14" fill="url(#light-grad-short)"/>
  <rect x="25" y="49" width="22" height="14" fill="url(#light-grad-short)"/>
  <rect x="49" y="49" width="14" height="14" fill="url(#light-grad-short)"/>
  
  <rect x="7" y="7" width="10" height="10" fill="black"/>
  <rect x="31" y="7" width="10" height="10" fill="black"/>
  <rect x="55" y="7" width="10" height="10" fill="black"/>
  
  <rect x="7" y="31" width="10" height="10" fill="black"/>
  <rect x="55" y="31" width="10" height="10" fill="black"/>
  
  <rect x="7" y="55" width="10" height="10" fill="black"/>
  <rect x="31" y="55" width="10" height="10" fill="black"/>
  <rect x="55" y="55" width="10" height="10" fill="black"/>
  
  <!-- shine line -->
  <line x1="1" y1="1.5" x2="63" y2="1.5" stroke="#ffffff80" stroke-width="1"/>
  <line x1="1" y1="62.5" x2="63" y2="62.5" stroke="#00000080" stroke-width="1"/>
</svg>